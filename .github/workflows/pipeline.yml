name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

env:
  REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Linting
      - name: Install Python dependencies
        run: pip install -r api/requirements.txt && pip install -r worker/requirements.txt
      
      - name: Install linters
        run: |
          pip install flake8
          npm install -g eslint

      - name: Run eslint
        run: npm --prefix frontend run lint

      - name: Run hadolint
        run: hadolint api/Dockerfile frontend/Dockerfile worker/Dockerfile

      # Build with caching
      - name: Build API
        run: |
          docker pull localhost:5000/api:cache || true
          docker build \
            --cache-from=localhost:5000/api:cache \
            -t localhost:5000/api:${{ github.sha }} \
            ./api
          docker tag localhost:5000/api:${{ github.sha }} localhost:5000/api:cache
          docker push localhost:5000/api:cache

      # Trivy scan + SARIF
      - name: Trivy scan
        run: |
          trivy image --format sarif --output trivy-results.sarif localhost:5000/api:${{ github.sha }}

      - name: Upload SARIF
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif

      # Integration test
      - name: Compose up
        run: docker compose up -d

      - name: Run integration.sh
        run: ./integration.sh

      - name: Teardown
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Pull image
        run: docker pull localhost:5000/api:${{ github.sha }}

      - name: Rolling deploy
        run: |
          docker run -d --name new_api -p 8001:8000 localhost:5000/api:${{ github.sha }}

          for i in {1..12}; do
            if curl -f http://localhost:8001/health; then
              if docker ps -a --format '{{.Names}}' | grep -q '^api$'; then
                docker stop api
                docker rm api
              fi
              docker rename new_api api
              break
            fi
            sleep 5
          done
